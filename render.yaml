services:
  - type: web
    name: mechanic-shop-advanced-api
    runtime: python
    plan: free
    region: ohio
    branch: main
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask --app flask_app.py init-db
    startCommand: gunicorn flask_app:app
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mechanic-shop-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SWAGGER_HOST
        fromService:
          name: mechanic-shop-advanced-api
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME

databases:
  - name: mechanic-shop-database
    plan: free
    region: ohio
    databaseName: mechanic_shop
    user: mechanic_shop_user
