name: Build, Test, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile project
        run: python -m compileall -q app config.py flask_app.py run.py seed.py

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automated tests
        run: python -m pytest -q

      - name: Validate production WSGI entry point
        env:
          DATABASE_URL: sqlite:///workflow-production-check.db
          SECRET_KEY: workflow-secret
          JWT_SECRET_KEY: workflow-jwt-secret
        run: python -c "from flask_app import app; assert app.config['TESTING'] is False"

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          test -n "$RENDER_SERVICE_ID" || (echo "Missing RENDER_SERVICE_ID secret" && exit 1)
          test -n "$RENDER_API_KEY" || (echo "Missing RENDER_API_KEY secret" && exit 1)

          curl --fail-with-body --request POST \
            --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"clearCache\":\"do_not_clear\",\"commitId\":\"${GITHUB_SHA}\"}"
